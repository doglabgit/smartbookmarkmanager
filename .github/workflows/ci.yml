name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: smartbookmark_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/smartbookmark_test
      JWT_SECRET: test-secret-key-that-is-at-least-32-characters-long-for-testing
      NODE_ENV: test
      CLAUDE_API_KEY: dummy-key-for-tests

    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: apps/api

      - name: Push test database schema
        run: npx prisma db push
        working-directory: apps/api
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}

      - name: Lint API
        run: npm run lint
        working-directory: apps/api

      - name: Test API
        run: npm test
        working-directory: apps/api
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          JWT_SECRET: ${{ env.JWT_SECRET }}
          NODE_ENV: ${{ env.NODE_ENV }}
          CLAUDE_API_KEY: ${{ env.CLAUDE_API_KEY }}

      - name: Upload coverage to Codecov (optional)
        if: always()
        uses: codecov/codecov-action@v3
        with:
          file: ./apps/api/coverage/lcov.info
          fail_ci_if_error: false
