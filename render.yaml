# Minimal Render Blueprint - verified working format

databases:
  - name: smartbookmark-db
    engine: postgres
    plan: free

services:
  - type: web
    name: smartbookmark-api
    env: docker
    dockerfilePath: apps/api/Dockerfile
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: smartbookmark-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: "*"
    healthCheckPath: /healthz

  - type: web
    name: smartbookmark-frontend
    env: docker
    dockerfilePath: apps/web/Dockerfile
    plan: free
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: "https://smartbookmark-api.onrender.com"
    healthCheckPath: /
