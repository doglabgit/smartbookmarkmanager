# Render Blueprint - tested format
# https://render.com/docs/blueprint-spec

databases:
  - type: postgres
    name: smartbookmark-db
    plan: free
    version: "15"

services:
  - type: web
    name: smartbookmark-api
    env: docker
    dockerfilePath: apps/api/Dockerfile
    plan: free
    buildCommand: ""
    startCommand: node index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: DATABASE_URL
        value: ""
        fromDatabase:
          name: smartbookmark-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: ENRICHMENT_CONCURRENCY
        value: "10"
    healthCheckPath: /healthz

  - type: web
    name: smartbookmark-frontend
    env: docker
    dockerfilePath: apps/web/Dockerfile
    plan: free
    buildCommand: ""
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      - key: NEXT_PUBLIC_API_URL
        value: "https://smartbookmark-api.onrender.com"
    healthCheckPath: /
